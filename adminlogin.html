<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- Navigation -->
    <header>

        <nav class="navbar">

            <div class="logo">
                <img src="./images/logo.png" alt="Logo">

                <div class="portal-name">
                    <h2>Complaint</h2>
                    <p>Management Portal</p>
                </div>

            </div>

            <div class="navigator">
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./about.html">About</a></li>
                    <li><a href="./contact.html">Contact Us</a></li>
                </ul>
            </div>

        </nav>

    </header>

    <section class="login-page">

        <div class="login-container">

            <div class="lock">
                <img src="./images/login-logo.svg">
            </div>

            <div class="login-header">
                <h1>Admin Login</h1>
                <p>
                    Login to manage complaints and users.
                </p>
            </div>

            <form>

                <div class="input-details">
                    <label>Admin Email</label>

                    <input id="adminEmail" type="email" placeholder="Enter admin email">
                </div>

                <div class="input-details">
                    <label>Password</label>

                    <input id="adminPassword" type="password" placeholder="Enter password">
                </div>

                <button id="adminLoginBtn" type="submit" class="account-btn">

                    Login

                </button>

            </form>

        </div>

    </section>

    <footer class="footer-login">

        <p>
            © 2026 Complaint Management Portal.
            All Rights Reserved.
        </p>

    </footer>

    <script src="./script/script.js"></script>

</body>

</html>
