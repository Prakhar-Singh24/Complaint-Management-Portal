<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>

        <nav class="navbar">

            <div class="logo">
                <img src="./images/logo.png" alt="Logo">

                <div class="portal-name">
                    <h2>Complaint</h2>
                    <p>Management Portal</p>
                </div>

            </div>

        </nav>

    </header>

    <section class="details-page">

        <div class="details-header">

            <h1>User Details</h1>

            <p>
                View complete user information.
            </p>

        </div>

        <div class="details-card">

            <div class="info-row">
                <strong>Name</strong>
                <span id="userDetailName">No Data</span>
            </div>

            <div class="info-row">
                <strong>Email</strong>
                <span id="userDetailEmail">No Data</span>
            </div>

            <div class="info-row">
                <strong>Phone</strong>
                <span id="userDetailPhone">No Data</span>
            </div>

            <div class="info-row">
                <strong>Total Complaints</strong>
                <span id="userComplaintCount">0</span>
            </div>

        </div>

        <div class="details-actions">

            <a href="./admindashboard.html">
                <button class="view-btn" id="backToDashboardBtn">
                    Back
                </button>
            </a>

        </div>

    </section>

    <footer class="footer-login">

        <p>
            © 2026 Complaint Management Portal.
            All Rights Reserved.
        </p>

    </footer>

    <script src="./script/script.js"></script>

</body>

</html>
