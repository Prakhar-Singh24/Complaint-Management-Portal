<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <header>

        <nav class="navbar">
            <div class="logo">
                <img src="./images/logo.png" alt="Logo">
                <div class="portal-name">
                    <h2>Complaint</h2>
                    <p>Management Portal</p>
                </div>
            </div>

            <div class="nav-right">
                <img src="./images/admin-notification-bell.svg" class="notification">
                <img src="./images/admin-profile.svg" class="profile">
                <div>
                    <h3>Admin</h3>
                    <p>Administrator</p>
                </div>
            </div>
        </nav>
    </header>

    <section class="manage-users-page">

        <div class="manage-users-header">
            <h1>Manage Users</h1>
            <p>Manage registered users of the portal.</p>
        </div>

        <div class="admin-card total-users-card">
            <h2>0</h2>
            <p>Total Users</p>
        </div>

        <div class="user-search-section">

            <input type="text" placeholder="Search users by name or email">

        </div>

        <div class="admin-table users-table">

            <h2>Registered Users</h2>

            <table>

                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>

                        <td>USR001</td>

                        <td>No Data</td>

                        <td>No Data</td>

                        <td>
                            <span class="status resolved">
                                Active
                            </span>
                        </td>

                        <td class="action-buttons">

                            <button class="view-btn">
                                View
                            </button>

                            <button class="delete-btn">
                                Delete
                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </section>

    <footer class="footer-login">
        <p>
            © 2026 Complaint Management Portal.
            All Rights Reserved.
        </p>
    </footer>

    <script src="./script/script.js"></script>

</body>

</html>
