<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register to Complaint Management System</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- Navigation -->
    <header>

        <nav class="navbar">
            <div class="logo">
                <img src="./images/logo.png" alt="">
                <div class="portal-name">
                    <h2>Complaint</h2>
                    <p>Management Portal</p>
                </div>
            </div>

            <div class="navigator">
                <ul>
                    <li><a href="#" class="homeBtn">Home</a> </li>
                    <li><a href="./complaint.html">Submit Complaint</a> </li>
                    <li><a href="./track.html">Track</a> </li>
                    <li><a href="./about.html">About</a> </li>
                    <li><a href="./contact.html">Contact Us</a> </li>
                </ul>
            </div>

            <div class="buttons">
                <button class="login" id="loginUserBtn">Login</button>
                <button class="register" id="registerUserBtn">Register</button>
            </div>
        </nav>
    </header>

    <section class="login-page">
        <div class="login-container">
            <div class="lock">
                <img src="./images/register-user-logo.svg">
            </div>

            <div class="login-header">
                <h1>Create Your Account</h1>
                <p>Join the Complaint Management Portal and make your voice heard.</p>
            </div>

            <form>

                <div class="input-details">
                    <label>Full Name</label>
                    <input id="fullName" type="name" placeholder="Enter your full name">
                </div>

                <div class="input-details">
                    <label>Email Address</label>
                    <input id="email" type="email" placeholder="Enter your email">
                </div>

                <div class="input-details">
                    <label>Phone Number</label>
                    <input id="phone" type="tel" placeholder="Enter your phone number">
                </div>

                <div class="input-details">
                    <label>Password</label>
                    <input id="password" type="password" placeholder="Create a password">
                </div>

                <div class="input-details">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password">
                </div>


                <button id="registerBtn" type="submit" class="account-btn">
                    Create Account
                </button>
            </form>

            <p class="account-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>

    </section>

    <footer class="footer-login">
        <p>
            © 2026 Complaint Management Portal.
            All Rights Reserved.
        </p>
    </footer>

    <script src="./script/script.js"></script>
</body>

</html>
